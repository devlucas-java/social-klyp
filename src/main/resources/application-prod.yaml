spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  accessExpiration: ${JWT_ACCESS_EXPIRATION:3600}
  refreshExpiration: ${JWT_REFRESH_EXPIRATION:7200}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

app:
  init-user:
    enabled: ${APP_INIT_USER_ENABLED:false}
    username: ${APP_INIT_USER_USERNAME:}
    email: ${APP_INIT_USER_EMAIL:}
    password: ${APP_INIT_USER_PASSWORD:}